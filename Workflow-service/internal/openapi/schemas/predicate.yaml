type: object
required: [values]
properties:
  attribute:
    type: string
    enum:
      - companyId
      - clientEmail
      - statusClient
      - text
      - userAgent
      - messageCreatedAt
      - themeId
    description: Поле, по которому будет проводится проверка
  comparison:
    type: string
    enum:
      - Eq
      - NotEq
      - Contains
      - NotContains
      - InInterval
      - NotInInterval
      - EndsWith
      - All
      - Date
    description: Выражение для сравнения (eq, contains, not_contains, in_interval, not_in_interval, ends_with, all)
  values:
    type: array
    items:
      type: string
    description: Значения, которые нужно сравнить
