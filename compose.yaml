name: appeals-distribution-system

services:
  # frontend:
  #   build:
  #     context: frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - crud
  #   networks:
  #     - app-network

  crud:
    build:
      context: CRUD-service
    ports:
      - "8080:8080"
    depends_on:
      postgres-crud:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres-crud:5432/crud?sslmode=disable
      - SERVER_ADDR=:8080

  postgres-crud:
    image: postgres:17
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app-network
    attach: false
    volumes:
      - postgres_crud_:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=crud

networks:
  app-network:
    driver: bridge

volumes:
  postgres_crud_:
